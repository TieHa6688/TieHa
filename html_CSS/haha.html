<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阮哥的洗面乳專賣鋪</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

  <nav class="nav">
    <span class="nav-brand">阮哥洗面乳</span>
    <a href="#query" class="nav-link">查詢訂單</a>
  </nav>

  <div class="container">
    <p class="store-label">Official Store</p>
    <h1>溫和潔淨<br>每天都值得</h1>

    <img src="734088491_1768729317884247_3017759108073552811_n.jpg" alt="洗面乳" class="product-image">

    <p class="price-tag">NT$ 800 <span class="price-sub">/ 瓶</span></p>

    <div class="divider"></div>

    <span class="form-label">填寫訂單資訊</span>
    <div id="form-errors" class="form-errors" hidden></div>

    <form action="/order" method="POST" id="order-form" novalidate>
      <input type="text" name="name" placeholder="姓名" required>
      <input type="tel" name="phone" placeholder="電話（0912345678）" required>
      <input type="text" name="address" placeholder="地址（台北市中正區重慶南路一段122號）" required>
      <input type="number" name="quantity" placeholder="數量" min="1" required>
      <p id="total-display" class="total-display">總價：NT$ 800</p>
      <button type="submit">立即下單</button>
    </form>

    <div class="divider" id="query"></div>

    <!-- 查詢訂單 -->
    <div class="query-section">
      <h2>查詢訂單</h2>
      <div class="query-row">
        <input type="text" id="query-input" placeholder="輸入訂單編號（例：A1B2C3D4）">
        <button onclick="queryOrder()">查詢</button>
      </div>
      <div id="query-result" hidden></div>
    </div>
  </div>

  <!-- 客服 -->
  <button type="button" id="chat-toggle" class="chat-toggle" aria-label="開啟客服">💬 客服</button>

  <div id="chat-panel" class="chat-panel" hidden>
    <div class="chat-header">
      <span>線上客服</span>
      <button type="button" id="chat-close" aria-label="關閉">✕</button>
    </div>
    <div id="chat-messages" class="chat-messages">
      <div class="chat-msg bot">您好！有什麼可以幫您的嗎？</div>
    </div>
    <div class="chat-quick">
      <button type="button" data-question="運費多少？">運費</button>
      <button type="button" data-question="如何付款？">付款</button>
      <button type="button" data-question="可以退貨嗎？">退貨</button>
      <button type="button" data-question="價格多少？">價格</button>
      <button type="button" data-question="產品成分是什麼？">成分</button>
    </div>
    <form id="chat-form" class="chat-input-row">
      <input type="text" id="chat-input" placeholder="輸入問題..." autocomplete="off">
      <button type="submit">送出</button>
    </form>
  </div>

  <script src="index.js"></script>
</body>
</html>
