<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>我的洗面乳商店</title>
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>我的洗面乳</h1>
    <img src="{{ url_for('static', filename='734088491_1768729317884247_3017759108073552811_n.jpg') }}" alt="洗面乳" class="product-image">
    <p class="price">價格：800元 / 瓶</p>

    <form action="/order" method="POST">
      <input type="text" name="name" placeholder="姓名" required>
      <input type="text" name="phone" placeholder="電話" required>
      <input type="text" name="address" placeholder="地址" required>
      <input type="number" name="quantity" placeholder="數量" min="1" required>
      <button type="submit">下單</button>
    </form>
  </div>

  <script src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
